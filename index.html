<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA Energy Legislation Dashboard - Consultant Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom UT Austin Aesthetic */
        :root {
            --ut-burnt-orange: #BF5700;
        }
        .bg-burnt-orange { background-color: var(--ut-burnt-orange); }
        .text-burnt-orange { color: var(--ut-burnt-orange); }
        .border-burnt-orange { border-color: var(--ut-burnt-orange); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <header class="bg-burnt-orange text-white p-8 shadow-md">
        <div class="max-w-6xl mx-auto flex items-center gap-6">
            <div>
                <h1 class="text-3xl font-bold">Virginia Energy & AI Legislation Dashboard</h1>
                <p class="text-white/80 mt-2">Track regulatory sentiment across Virginia over bills concerning data center impacts</p>
                <div class="mt-4 text-sm font-semibold bg-white/10 inline-block px-3 py-1 rounded">
                    Live Data Feed: <span id="status-indicator" class="text-green-300">Active</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-8">
        <div class="mb-6 border-b pb-4">
            <h2 class="text-2xl font-semibold text-slate-700">Active Bills & Proposals</h2>
            <p class="text-slate-500 text-sm">Consultant validation recommended for low-scoring legislation.</p>
        </div>

        <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <p class="text-slate-500 italic" id="loading-text">Loading automated data analysis...</p>
        </div>
    </main>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('data.json');
                
                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }
                
                const bills = await response.json();
                const grid = document.getElementById('dashboard-grid');
                grid.innerHTML = '';

                bills.forEach(bill => {
                    const id = bill.id || "Unknown ID";
                    const headline = bill.headline || bill.summary || "Pending AI Update...";
                    const fullSummary = bill.full_summary || bill.summary || "Please run the GitHub Action to generate the full summary.";
                    const score = bill.sentiment_score || 0;
                    const supporters = bill.supporters || "Pending Data";
                    const opponents = bill.opponents || "Pending Data";
                    
                    // Generate a smart Google Search link
                    const searchQuery = encodeURIComponent(id + " Virginia data center legislation -ai");
                    const searchLink = "https://www.google.com/search?q=" + searchQuery;

                    // Determine color based on likelihood to pass
                    let sentimentColor = 'bg-red-500';
                    if (score >= 40) sentimentColor = 'bg-yellow-500';
                    if (score >= 70) sentimentColor = 'bg-green-500';

                    const card = `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-lg transition-shadow">
                            <div class="p-5 border-b border-slate-100 flex justify-between items-start bg-slate-50/50">
                                <div>
                                    <span class="text-xs font-bold text-burnt-orange uppercase tracking-wider">${id}</span>
                                    <h3 class="text-xl font-bold mt-1 text-slate-900 leading-tight">${headline}</h3>
                                </div>
                            </div>
                            
                            <div class="p-5">
                                <p class="text-sm text-slate-700 mb-6 leading-relaxed">${fullSummary}</p>
                                
                                <div class="mb-5 bg-slate-50 p-4 rounded-lg border border-slate-100">
                                    <div class="flex justify-between text-xs font-semibold mb-1 text-slate-600">
                                        <span>AI Prediction of Success</span>
                                        <span class="font-bold text-slate-900">${score}%</span>
                                    </div>
                                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                                        <div class="${sentimentColor} h-2.5 rounded-full" style="width: ${score}%"></div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-4 text-sm mt-4 pt-4 border-t border-slate-200">
                                    <div>
                                        <span class="block text-xs font-bold text-green-700 uppercase mb-1">Supporters</span>
                                        <span class="text-slate-700">${supporters}</span>
                                    </div>
                                    <div>
                                        <span class="block text-xs font-bold text-red-700 uppercase mb-1">Opponents</span>
                                        <span class="text-slate-700">${opponents}</span>
                                    </div>
                                </div>
                                
                                <div class="mt-6 pt-4 border-t border-slate-100">
                                    <a href="${searchLink}" 
                                       target="_blank" 
                                       class="inline-block w-full text-center bg-slate-100 text-slate-700 text-sm font-semibold px-4 py-2.5 rounded-lg hover:bg-slate-200 transition">
                                       Search for Bill Text on Google
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });

            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('dashboard-grid').innerHTML = `
                    <div class="col-span-full bg-red-50 text-red-600 p-4 rounded-lg border border-red-200">
                        <strong>Error:</strong> Could not load data.json. Ensure the automated backend workflow has completed.
                    </div>
                `;
                document.getElementById('status-indicator').textContent = "Offline";
                document.getElementById('status-indicator').className = "text-red-400";
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
