<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA Energy Legislation Dashboard - Consultant Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ut-burnt-orange: #BF5700; }
        .bg-burnt-orange { background-color: var(--ut-burnt-orange); }
        .text-burnt-orange { color: var(--ut-burnt-orange); }
        .border-burnt-orange { border-color: var(--ut-burnt-orange); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <header class="bg-burnt-orange text-white p-8 shadow-md">
        <div class="max-w-7xl mx-auto flex items-center gap-6">
            <div>
                <h1 class="text-3xl font-bold">Virginia Energy & AI Legislation Dashboard</h1>
                <p class="text-white/80 mt-2">Track regulatory sentiment and predicted grid impacts across Virginia.</p>
                <div class="mt-4 text-sm font-semibold bg-white/10 inline-block px-3 py-1 rounded flex items-center gap-2 w-fit">
                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                    Live API Feed: Active
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Bill Tracking Grid -->
            <div class="lg:col-span-2">
                <div class="mb-6 border-b pb-4">
                    <h2 class="text-2xl font-semibold text-slate-700">Active Bills & Proposals</h2>
                    <p class="text-slate-500 text-sm">Consultant validation recommended for impact predictions.</p>
                </div>
                
                <div id="dashboard-grid" class="flex flex-col gap-6">
                    <p class="text-slate-500 italic" id="loading-text">Loading automated data analysis...</p>
                </div>
            </div>

            <!-- Right Column: Live Intelligence Feed -->
            <div class="lg:col-span-1 bg-white border border-slate-200 rounded-xl p-6 shadow-sm h-fit sticky top-8">
                <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">
                    Live Intelligence Feed
                </h3>
                <div id="news-feed" class="flex flex-col gap-5">
                    <!-- News Items Populate Here -->
                </div>
            </div>
            
        </div>
    </main>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error("Network response was not ok");
                
                const bills = await response.json();
                
                const grid = document.getElementById('dashboard-grid');
                const newsFeed = document.getElementById('news-feed');
                
                grid.innerHTML = '';
                newsFeed.innerHTML = '';

                bills.forEach(bill => {
                    const id = bill.id || "Unknown ID";
                    const headline = bill.headline || "Pending AI Update...";
                    const summaryText = bill.full_summary || bill.short_summary || "Pending summary...";
                    const status = bill.status || "Checking LegiScan...";
                    const score = bill.sentiment_score || 0;
                    
                    // Specific Search Query Logic for the user button (Kept the '-ai' fix)
                    const searchQuery = encodeURIComponent(id + " Virginia data center legislation bill text -ai");
                    const searchLink = "https://www.google.com/search?q=" + searchQuery;

                    let sentimentColor = 'bg-red-500';
                    if (score >= 40) sentimentColor = 'bg-yellow-500';
                    if (score >= 70) sentimentColor = 'bg-green-500';

                    // 1. Build the Bill Card (Reverted to the clean, minimal layout)
                    const billCard = `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow">
                            <div class="p-5 border-b border-slate-100 flex justify-between items-start bg-slate-50/50">
                                <div>
                                    <span class="text-xs font-bold text-burnt-orange uppercase tracking-wider">${id}</span>
                                    <h3 class="text-xl font-bold mt-1 text-slate-900 leading-tight">${headline}</h3>
                                </div>
                            </div>
                            
                            <div class="p-5">
                                <div class="mb-4 inline-block bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded font-mono border border-slate-200">
                                    🏛️ ${status}
                                </div>
                            
                                <p class="text-sm text-slate-700 mb-6 leading-relaxed">${summaryText}</p>
                                
                                <div class="mb-5 bg-slate-50 p-4 rounded-lg border border-slate-100">
                                    <div class="flex justify-between text-xs font-semibold mb-1 text-slate-600">
                                        <span>AI Prediction of Success</span>
                                        <span class="font-bold text-slate-900">${score}%</span>
                                    </div>
                                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                                        <div class="${sentimentColor} h-2.5 rounded-full" style="width: ${score}%"></div>
                                    </div>
                                </div>
                                
                                <a href="${searchLink}" target="_blank" class="inline-block w-full text-center bg-slate-100 text-slate-700 text-sm font-semibold px-4 py-2.5 rounded-lg hover:bg-slate-200 transition">
                                   Search for Bill Text on Google
                                </a>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += billCard;

                    // 2. Build the News Card (Right side)
                    const newsHeadline = bill.news_headline || "Searching for recent coverage...";
                    const newsSummary = bill.news_summary || "Automated intelligence gathering in progress.";
                    const newsLink = bill.news_link || "#";

                    const newsCard = `
                        <div class="bg-slate-50 rounded-lg p-4 border border-slate-100 hover:bg-slate-100 transition-colors">
                            <span class="text-[10px] font-bold text-burnt-orange uppercase tracking-wider block mb-1">Related to ${id}</span>
                            <h4 class="font-bold text-slate-800 text-sm leading-tight mb-2">${newsHeadline}</h4>
                            <p class="text-xs text-slate-600 mb-3 line-clamp-3">${newsSummary}</p>
                            <a href="${newsLink}" target="_blank" class="text-xs font-semibold text-blue-600 hover:text-blue-800 flex items-center gap-1">
                                Read Source Article <span aria-hidden="true">&rarr;</span>
                            </a>
                        </div>
                    `;
                    newsFeed.innerHTML += newsCard;
                });

            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('dashboard-grid').innerHTML = `
                    <div class="col-span-full bg-red-50 text-red-600 p-4 rounded-lg border border-red-200">
                        <strong>Error:</strong> Could not load data.json. Ensure the backend Action has run.
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
