name: Daily Bill Update

on:
  schedule:
    - cron: '0 12 * * *' # Runs at 12:00 UTC (8:00 AM EST) daily
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    # This silences the Node 20 warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        # Added 'requests' here so Python can fetch the LegiScan data
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests
          
      - name: Run Scraper
        # Added the LegiScan API Key to the environment variables
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: python scraper.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git commit -m "Automated data update via Gemini and LegiScan" || exit 0
          git push
